name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_FATMA }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker backend
        run: docker build -t ${{ secrets.DOCKERHUB_FATMA }}/springboot-app:latest ./springboot/app

      - name: Push Docker backend
        run: docker push ${{ secrets.DOCKERHUB_FATMA }}/springboot-app:latest

      - name: Build Docker frontend
        run: docker build -t ${{ secrets.DOCKERHUB_FATMA }}/angular-app:latest ./angular-app

      - name: Push Docker frontend
        run: docker push ${{ secrets.DOCKERHUB_FATMA }}/angular-app:latest

