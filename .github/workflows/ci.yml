name: CI/CD Docker Build & Test

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Java 11 (pour Maven)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3️⃣ Compiler le backend avec Maven
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # 4️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_FATMA }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build et push backend Docker
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_FATMA }}/springboot-app:latest

      # 6️⃣ Build et push frontend Docker
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_FATMA }}/angular-app:latest

      # 7️⃣ Test application avec Docker Compose
      - name: Test application with Docker Compose
        run: |
          echo "🚀 Démarrage des conteneurs"
          docker-compose up -d
          sleep 25

          echo "🔍 Vérification des conteneurs"
          docker-compose ps

          echo "🔍 Test Backend (8081)"
          if curl -s -f http://localhost:8081/actuator/health; then
            echo "✅ Backend OK"
          else
            echo "❌ Backend ERROR"
            exit 1
          fi

          echo "🔍 Test Frontend (4200)"
          if curl -s -f http://localhost:4200; then
            echo "✅ Frontend OK"
          else
            echo "❌ Frontend ERROR"
            exit 1
          fi

          echo "🔍 Test API (Frontend → Backend)"
          if curl -s -f http://localhost:8081/api/hello; then
            echo "✅ API OK - Frontend communique avec Backend"
          else
            echo "❌ API ERROR - Communication KO"
            exit 1
          fi

          echo "🧹 Arrêt des conteneurs"
          docker-compose down

