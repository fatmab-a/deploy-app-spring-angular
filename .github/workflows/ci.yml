name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 3 : Builder l'image backend Spring Boot
      - name: Build Docker backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot

      # Étape 4 : Pousser l'image backend
      - name: Push Docker backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Étape 5 : Builder l'image frontend Angular
      - name: Build Docker frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # Étape 6 : Pousser l'image frontend
      - name: Push Docker frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

