name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v3

     
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_fatma }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      
      - name: Build Docker backend
        run: docker build -t ${{ secrets.DOCKERHUB_fatma }}/springboot-app ./springboot/app

      
      - name: Push Docker backend
        run: docker push ${{ secrets.DOCKERHUB_fatma }}/springboot-app

      
      - name: Build Docker frontend
        run: docker build -t ${{ secrets.DOCKERHUB_fatma }}/angular-app ./angular-app

      
      - name: Push Docker frontend
        run: docker push ${{ secrets.DOCKERHUB_fatma }}/angular-app

