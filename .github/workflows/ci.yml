name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # BUILD BACKEND
      # =========================
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # =========================
      # LOGIN DOCKER HUB
      # =========================
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # BUILD & PUSH BACKEND IMAGE
      # =========================
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: fatmab-a/springboot-app:latest

      # =========================
      # BUILD & PUSH FRONTEND IMAGE
      # =========================
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: fatmab-a/angular-app:latest

      # =========================
      # INSTALL DOCKER COMPOSE
      # =========================
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      # =========================
      # TEST AVEC DOCKER COMPOSE
      # =========================
      - name: Test with Docker Compose
        run: |
          docker compose up -d
          sleep 30

          docker compose ps

          curl -f http://localhost:8080 || exit 1
          curl -f http://localhost:4200 || exit 1

          docker compose down

