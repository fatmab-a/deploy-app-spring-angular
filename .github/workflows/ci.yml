name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests
      - name: Use your own images
        run: |
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest|g" docker-compose.yml

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Update docker-compose images
        run: |
          # Remplacer les images dans docker-compose.yml
          sed -i "s|image:.*angular-app.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|image:.*springboot-app.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest|g" docker-compose.yml
          echo "✅ docker-compose.yml mis à jour avec vos images"

      - name: Start services with Docker Compose
        run: |
          echo "========================================="
          echo "🚀 DÉMARRAGE DES SERVICES"
          echo "========================================="
          docker compose up -d mysql backend frontend
          
          echo "⏳ Attente de MySQL..."
          for i in {1..30}; do
            if docker compose exec mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; then
              echo "✅ MySQL prêt après $i secondes"
              break
            fi
            echo "⏳ En attente de MySQL... $i/30"
            sleep 2
          done
          
          echo "⏳ Attente du backend..."
          for i in {1..60}; do
            if curl -s -f http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "✅ Backend prêt après $i secondes"
              break
            fi
            echo "⏳ Backend pas encore prêt... $i/60"
            sleep 2
          done

      - name: Test frontend
        run: |
          echo "========================================="
          echo "🔍 TEST FRONTEND"
          echo "========================================="
          if curl -s -f http://localhost:4200 > /dev/null; then
            echo "✅ FRONTEND OK - accessible sur le port 4200"
          else
            echo "❌ FRONTEND ERROR"
            docker compose logs frontend --tail=50
            exit 1
          fi

      - name: Test backend API
        run: |
          echo "========================================="
          echo "🔍 TEST BACKEND"
          echo "========================================="
          if curl -s -f http://localhost:8081/api/hello > /dev/null; then
            echo "✅ BACKEND OK - API accessible"
          else
            echo "❌ BACKEND ERROR - API non accessible"
            docker compose logs backend --tail=50
            exit 1
          fi

      - name: Show container status
        run: |
          echo "========================================="
          echo "📋 STATUT DES CONTENEURS"
          echo "========================================="
          docker compose ps

      - name: Show logs
        run: |
          echo "========================================="
          echo "📋 LOGS RÉCENTS"
          echo "========================================="
          docker compose logs --tail=30

      - name: Stop services
        run: |
          echo "========================================="
          echo "🧹 ARRÊT DES SERVICES"
          echo "========================================="
          docker compose down -v

      - name: Final verification
        if: always()
        run: |
          echo "========================================="
          echo "✅ WORKFLOW TERMINÉ"
          echo "   - Images Docker poussées sur Docker Hub"
          echo "   - Backend testé sur port 8081"
          echo "   - Frontend testé sur port 4200"
          echo "========================================="

