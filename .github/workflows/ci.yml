name: Build, Push and Test Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Java
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3️⃣ Build backend
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # 4️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build & push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # 6️⃣ Build & push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # 7️⃣ Remplacer images dans docker-compose.yml
      - name: Update docker-compose images
        run: |
          sed -i "s|image:.*angular-app.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|image:.*springboot-app.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest|g" docker-compose.yml

      # 8️⃣ Test complet
      - name: Test application
        run: |
          echo "🚀 Démarrage conteneurs"
          docker compose up -d

          echo "⏳ Attente Backend..."
          for i in {1..60}; do
            if curl -s -f http://localhost:8081/actuator/health > /dev/null; then
              echo "✅ Backend prêt après $i*2 sec"
              break
            fi
            echo "⏳ Attente Backend... $i/60"
            sleep 2
          done

          echo "⏳ Attente Frontend..."
          for i in {1..60}; do
            if curl -s -f http://localhost:4200 > /dev/null; then
              echo "✅ Frontend prêt après $i*2 sec"
              break
            fi
            echo "⏳ Attente Frontend... $i/60"
            sleep 2
          done

          echo "🔍 Test API backend"
          if curl -s -f http://localhost:8081/api/hello > /dev/null; then
            echo "✅ API OK"
          else
            echo "❌ API ERROR"
            docker compose logs springboot-app --tail=50
            exit 1
          fi

          echo "🧹 Nettoyage"
          docker compose down -v

