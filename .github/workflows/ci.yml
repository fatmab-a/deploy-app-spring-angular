name: CI/CD - Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Java et Maven pour backend
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3️⃣ Compiler le backend
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # 4️⃣ Login sur Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build et push backend
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: fatmab-a/springboot-app:latest

      # 6️⃣ Build et push frontend
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: fatmab-a/angular-app:latest

      # 7️⃣ Test avec Docker Compose
      - name: Test with Docker Compose
        run: |
          docker compose up -d
          sleep 30
          echo "✅ Conteneurs démarrés"
          docker compose ps
          # Test backend
          if curl -s -f http://localhost:8081/actuator/health; then
            echo "✅ Backend OK"
          else
            echo "❌ Backend KO"
            exit 1
          fi
          # Test frontend
          if curl -s -f http://localhost:4200; then
            echo "✅ Frontend OK"
          else
            echo "❌ Frontend KO"
            exit 1
          fi
          # Stop conteneurs
          docker compose down

